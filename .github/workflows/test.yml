name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true

  api-tests:
    name: api-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api
        env:
          CI: true

  data-tests:
    name: data-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data quality tests
        run: npm run test:data
        env:
          CI: true

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          CI: true

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run type-check

  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke end-to-end tests
        run: npm run test:e2e:smoke
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 30

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check for exposed secrets
        run: |
          if grep -rE "(sk-ant-api03-|sk-[a-zA-Z0-9]{32,}|SUPABASE_SERVICE_ROLE_KEY\s*=\s*[^'\"].*[^'\"])" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next \
            . | grep -vE "(\.test\.|\.spec\.|\.env\.example|your-.*-here|placeholder|example|NEXT_PUBLIC_SUPABASE_ANON_KEY|NEXT_PUBLIC_SUPABASE_URL)"; then
            echo "Potential secrets detected in code."
            exit 1
          fi
          echo "No exposed secrets found"

      - name: Check environment variable usage
        run: |
          if grep -rE "NEXT_PUBLIC.*(API.*KEY|SECRET|TOKEN)" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
            --exclude-dir=node_modules --exclude-dir=.next \
            . | grep -vE "(NEXT_PUBLIC_SUPABASE_ANON_KEY|NEXT_PUBLIC_SUPABASE_URL|\.test\.|\.spec\.|\.env\.example)"; then
            echo "Warning: NEXT_PUBLIC_* variables should not contain secrets"
            grep -rE "NEXT_PUBLIC.*(API.*KEY|SECRET|TOKEN)" \
              --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
              --exclude-dir=node_modules --exclude-dir=.next \
              . | grep -vE "(NEXT_PUBLIC_SUPABASE_ANON_KEY|NEXT_PUBLIC_SUPABASE_URL|\.test\.|\.spec\.|\.env\.example)" || true
          fi

      - name: Verify .env.example exists
        run: test -f .env.example

      - name: Check .env.example for placeholder values
        run: |
          if grep -E "(sk-ant-api03-|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9)" .env.example 2>/dev/null | grep -vE "(your-.*-here|placeholder|example)"; then
            echo ".env.example contains potential secrets"
            exit 1
          fi
          echo ".env.example uses placeholder values"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm run security-audit
        continue-on-error: true

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, data-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate coverage report
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  test-summary:
    name: test-summary
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, data-tests, build, lint, typecheck, e2e-smoke, security, coverage]
    if: always()
    steps:
      - name: Summarize test results
        run: |
          echo "unit-tests: ${{ needs.unit-tests.result }}"
          echo "api-tests: ${{ needs.api-tests.result }}"
          echo "data-tests: ${{ needs.data-tests.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "lint: ${{ needs.lint.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "e2e-smoke: ${{ needs.e2e-smoke.result }}"
          echo "security: ${{ needs.security.result }}"
          echo "coverage: ${{ needs.coverage.result }}"

